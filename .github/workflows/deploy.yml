name: Build and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: "deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build Web Version
        run: |
          mkdir -p /tmp/kepler-path-web
          cp main.py game.py orbit.py requirements.txt requirements-build.txt Makefile /tmp/kepler-path-web/
          cp -R assets /tmp/kepler-path-web/assets
          cd /tmp/kepler-path-web
          make web

      - name: Patch pygbag settings
        run: |
          sed -i 's/ume_block : 1/ume_block : 0/' /tmp/kepler-path-web/build/web/index.html
          sed -i 's/autorun : 0/autorun : 1/' /tmp/kepler-path-web/build/web/index.html

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push /tmp/kepler-path-web/build/web/ kidskoding/ci489-final:html

      - name: Trigger Render deploy
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
