name: Build Game for Render

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'server/public/game/**'

permissions:
  contents: write

concurrency:
  group: "build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://ci-489-final.onrender.com
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build Web Version
        run: |
          mkdir -p /tmp/kepler-path-web
          cp main.py game.py orbit.py requirements.txt requirements-build.txt Makefile /tmp/kepler-path-web/
          cp -R assets /tmp/kepler-path-web/assets
          cd /tmp/kepler-path-web
          make web

      - name: Copy build to server/public/game
        run: |
          rm -rf server/public/game
          cp -R /tmp/kepler-path-web/build/web server/public/game
          sed -i 's/ume_block : 1/ume_block : 0/' server/public/game/index.html
          sed -i 's/autorun : 0/autorun : 1/' server/public/game/index.html

      - name: Commit and push game files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f server/public/game
          git diff --staged --quiet || git commit -m "build: update pygbag game files [skip ci]"
          git push

      - name: Trigger Render deploy
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
