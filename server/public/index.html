<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kepler Path - Simulation</title>
    <style>
        body { margin: 0; background: #061822; overflow: hidden; }
        iframe { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>
    <!-- The iframe loads the pygbag build and passes this backend as the WebSocket relay. -->
    <iframe id="game-frame" title="Kepler Path Simulation"></iframe>

    <script>
        const gameFrame = document.getElementById('game-frame');
        const gameUrl = new URL('/game/', window.location.origin);
        gameUrl.searchParams.set('relay', window.location.host);
        gameFrame.src = gameUrl.toString();
    </script>
</body>
</html>
